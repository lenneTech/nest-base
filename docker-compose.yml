# Docker Compose for local dev dependencies only.
# The server itself runs natively via `bun --watch` (NOT in Docker).
# See docs/architecture.md for the dev-vs-prod split.
#
# No `name:` is set on purpose. Compose then derives the project namespace
# (and therefore the volume names) from the parent directory — i.e. the
# consumer's workspace. Hard-coding e.g. `name: nest-base` would make every
# `--next` workspace share `nest-base_postgres_data` and inherit each
# other's POSTGRES_PASSWORD on first boot, producing P1000 auth errors
# whenever the wizard regenerates secrets.

services:
  postgres:
    # Custom image: postgres:17 + postgis + pg_uuidv7. See docker/postgres/Dockerfile.
    # `pull_policy: build` would force a rebuild on every up; we leave it default so
    # the image is built once on first `up` and re-used until `docker compose build postgres`.
    build:
      context: ./docker/postgres
    image: nest-base-postgres:local
    restart: unless-stopped
    # Use `env_file:` instead of `${VAR:-default}` substitution. Substitution
    # reads shell env first, .env second — which silently leaks
    # POSTGRES_USER / POSTGRES_PASSWORD from a previous workspace's shell into
    # this workspace's container. `env_file:` injects directly from .env on
    # the workspace, ignoring shell. The `$$VAR` escapes in healthcheck below
    # defer expansion to the container shell, so they read the same env_file.
    env_file:
      - .env
    # Logical replication is required for PowerSync.
    # Without wal_level=logical the WAL decoder cannot ship row changes; without
    # the *_senders / *_slots headroom the replication slot cannot attach.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    # Host-port is configurable so two `--next` workspaces on the same
    # box don't collide on 5432. `setup-wizard` writes a free port into
    # `.env`; if you flip it manually, also flip the port in
    # `DATABASE_URL` (Compose `.env` files don't expand vars by default).
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 3s
      retries: 5

  powersync:
    # PowerSync sync engine. Pulls the WAL from
    # Postgres, applies sync-rules.yaml, exposes WebSocket+HTTP for clients.
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Same rationale as postgres: env_file beats shell-env precedence.
    env_file:
      - .env
    environment:
      POWERSYNC_DATABASE_URI: postgresql://powersync:$${POWERSYNC_DB_PASSWORD}@postgres:5432/$${POSTGRES_DB}
      POWERSYNC_PORT: '8080'
      # Better-Auth exposes JWKS at /.well-known/jwks (see Phase 5b-5).
      # The host.docker.internal host lets the container reach the bun-watched
      # API running on the docker host (not inside compose).
      POWERSYNC_JWKS_URL: ${POWERSYNC_JWKS_URL:-http://host.docker.internal:3000/.well-known/jwks}
      POWERSYNC_JWT_AUDIENCE: powersync
    ports:
      - '8080:8080'
    volumes:
      - ./docker/powersync/sync-rules.yaml:/config/sync-rules.yaml:ro

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ROOT_USER: ${S3_ACCESS_KEY:-rustfs}
      RUSTFS_ROOT_PASSWORD: ${S3_SECRET_KEY:-rustfs-secret}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web UI
    volumes:
      - rustfs_data:/data
    command: ['server', '/data', '--console-address', ':9001']

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ['--config=/etc/otel-config.yaml']
    volumes:
      - ./docker/otel-config.yaml:/etc/otel-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP

volumes:
  postgres_data:
  rustfs_data:

networks:
  default:
    driver: bridge
