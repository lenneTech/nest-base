# Docker Compose for local dev dependencies only.
# The server itself runs natively via `bun --watch` (NOT in Docker).
# See docs/architecture.md for the dev-vs-prod split.
#
# No `name:` is set on purpose. Compose then derives the project namespace
# (and therefore the volume names) from the parent directory — i.e. the
# consumer's workspace. Hard-coding e.g. `name: nest-base` would make every
# `--next` workspace share `nest-base_postgres_data` and inherit each
# other's POSTGRES_PASSWORD on first boot, producing P1000 auth errors
# whenever the wizard regenerates secrets.

services:
  postgres:
    # Custom image: postgres:18 + postgis + pg_uuidv7. See docker/postgres/Dockerfile.
    # `pull_policy: build` would force a rebuild on every up; we leave it default so
    # the image is built once on first `up` and re-used until `docker compose build postgres`.
    build:
      context: ./docker/postgres
    image: nest-base-postgres:local
    restart: unless-stopped
    # Use `env_file:` instead of `${VAR:-default}` substitution. Substitution
    # reads shell env first, .env second — which silently leaks
    # POSTGRES_USER / POSTGRES_PASSWORD from a previous workspace's shell into
    # this workspace's container. `env_file:` injects directly from .env on
    # the workspace, ignoring shell. The `$$VAR` escapes in healthcheck below
    # defer expansion to the container shell, so they read the same env_file.
    env_file:
      - .env
    # Logical replication is required for PowerSync.
    # Without wal_level=logical the WAL decoder cannot ship row changes; without
    # the *_senders / *_slots headroom the replication slot cannot attach.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    # Host-port is configurable so two `--next` workspaces on the same
    # box don't collide on 5432. `setup-wizard` writes a free port into
    # `.env`; if you flip it manually, also flip the port in
    # `DATABASE_URL` (Compose `.env` files don't expand vars by default).
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 3s
      retries: 5

  powersync:
    # PowerSync sync engine. Pulls the WAL from
    # Postgres, applies sync-rules.yaml, exposes WebSocket+HTTP for clients.
    # Pin to a specific release to avoid unexpected breaking changes on `docker compose pull`.
    # Check https://github.com/powersync-ja/powersync-service/releases for the latest tag.
    image: journeyapps/powersync-service:0.9.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Same rationale as postgres: env_file beats shell-env precedence.
    env_file:
      - .env
    environment:
      POWERSYNC_DATABASE_URI: postgresql://powersync:$${POWERSYNC_DB_PASSWORD}@postgres:5432/$${POSTGRES_DB}
      POWERSYNC_PORT: '8080'
      # Better-Auth exposes JWKS at /.well-known/jwks (see Phase 5b-5).
      # The host.docker.internal host lets the container reach the bun-watched
      # API running on the docker host (not inside compose).
      POWERSYNC_JWKS_URL: ${POWERSYNC_JWKS_URL:-http://host.docker.internal:3000/.well-known/jwks}
      POWERSYNC_JWT_AUDIENCE: powersync
    ports:
      - '8080:8080'
    volumes:
      - ./docker/powersync/sync-rules.yaml:/config/sync-rules.yaml:ro

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ROOT_USER: ${S3_ACCESS_KEY:-rustfs}
      RUSTFS_ROOT_PASSWORD: ${S3_SECRET_KEY:-rustfs-secret}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web UI
    volumes:
      - rustfs_data:/data
    command: ['server', '/data', '--console-address', ':9001']

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    # `--smtp-disable-rdns` skips Mailpit's reverse-DNS lookup of the
    # connecting client IP. Inside Docker bridge networks the host has
    # no PTR record, so the lookup blocks for ~5 s before Mailpit sends
    # the SMTP greeting — long enough to time out modern SMTP clients
    # (Nodemailer ≥ 7 has a 10 s greeting timeout by default).
    command: ['--smtp-disable-rdns']
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    # Host-port binding is for local dev only. Do not expose in production.
    # To disable the host binding, comment out the ports block below.
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', "${REDIS_PASSWORD}", 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  otel-collector:
    # Pin to a specific release to avoid unexpected breaking changes on `docker compose pull`.
    # Check https://github.com/open-telemetry/opentelemetry-collector-contrib/releases for the latest tag.
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    command: ['--config=/etc/otel-config.yaml']
    volumes:
      - ./docker/otel-config.yaml:/etc/otel-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP

  # Oneshot service: downloads + extracts the GeoIP `.mmdb` on first
  # `docker compose up`. Profile-gated so it doesn't run by default —
  # opt in with `docker compose --profile geoip up geoip-init`.
  # The api container can mount `./data/geoip:/data/geoip:ro` to read
  # the database without owning the download lifecycle.
  geoip-init:
    profiles: ['geoip']
    image: alpine:3.20
    env_file:
      - .env
    volumes:
      - ./data/geoip:/data/geoip
    # Default to dbip-lite (no license key needed, CC-BY-4.0). Override
    # with FEATURE_GEO_IP_PROVIDER=maxmind + FEATURE_GEO_IP_LICENSE_KEY.
    command: |
      sh -c '
        set -eu
        provider="${FEATURE_GEO_IP_PROVIDER:-dbip-lite}"
        target=/data/geoip/city.mmdb
        mkdir -p /data/geoip
        apk add --no-cache curl gzip tar >/dev/null
        if [ "$$provider" = "dbip-lite" ]; then
          ym=$$(date -u +%Y-%m)
          url="https://download.db-ip.com/free/dbip-city-lite-$${ym}.mmdb.gz"
          echo "[geoip-init] downloading $$url"
          curl -fsSL "$$url" | gunzip > "$$target"
        elif [ "$$provider" = "maxmind" ]; then
          if [ -z "${FEATURE_GEO_IP_LICENSE_KEY:-}" ]; then
            echo "[geoip-init] FEATURE_GEO_IP_LICENSE_KEY required for maxmind"; exit 2
          fi
          url="https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=$${FEATURE_GEO_IP_LICENSE_KEY}&suffix=tar.gz"
          echo "[geoip-init] downloading GeoLite2-City"
          tmp=$$(mktemp -d)
          curl -fsSL "$$url" -o "$$tmp/db.tar.gz"
          tar -xzf "$$tmp/db.tar.gz" -C "$$tmp"
          find "$$tmp" -name "*.mmdb" -exec cp {} "$$target" \;
          rm -rf "$$tmp"
        else
          echo "[geoip-init] unknown provider $$provider"; exit 2
        fi
        echo "[geoip-init] wrote $$target ($$(stat -c%s $$target 2>/dev/null || stat -f%z $$target) bytes)"
      '

volumes:
  postgres_data:
  rustfs_data:
  redis_data:

networks:
  default:
    driver: bridge
