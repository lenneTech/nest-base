# portless local dev topology — DOCUMENTATION ONLY in portless 0.11+.
# https://github.com/vercel-labs/portless
#
# portless 0.11 dropped the YAML-config model in favour of a per-process
# CLI: `portless run --name <name> -- <cmd>`. `scripts/dev.ts` calls
# `portless run --name api.<project> -- bun --watch src/main.ts` to put
# the API behind https://api.<project>.localhost.
#
# This file is preserved as the human-readable map of the intended URL
# layout (api / mailpit / rustfs) and is rewritten by `bun run rename`
# along with the other canonical files. Mailpit + RustFS routes can be
# registered via `portless alias mail.<project> 8025` and
# `portless alias s3.<project> 9001`.

project: nest-base

services:
  api:
    target: 'http://localhost:3000'
    public: 'api.nest-base.localhost'
  mailpit:
    target: 'http://localhost:8025'
    public: 'mail.nest-base.localhost'
  rustfs:
    target: 'http://localhost:9001'
    public: 's3.nest-base.localhost'
